<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; padding: 12px; font-family: sans-serif; }
    input, textarea, button { width: 100%; margin-bottom: 8px; box-sizing: border-box; padding: 6px; }
    textarea { height: 60px; resize: none; font-size: 11px; }
    .btn-group { display: flex; gap: 5px; }
    .btn-group button { flex: 1; }
    .protocol-label { font-size: 12px; color: #666; margin-bottom: 8px; display: block; }
    
    /* استایل بخش فوتر */
    .footer {
      margin-top: 15px;
      text-align: center;
      font-size: 11px;
      color: #888;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }
    .footer a {
      color: #008CBA;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-top: 4px;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h3 id="formTitle">Add Profile</h3>
  <input id="name" placeholder="Profile Name">
  <div class="protocol-label">Protocol: <strong>SOCKS5</strong></div>
  <input id="host" placeholder="Host/IP">
  <input id="port" type="text" placeholder="Port">
  <textarea id="bypass" placeholder="Bypass List (e.g. *.ir, localhost) - separate with comma"></textarea>
  <button id="save" style="background-color: #4CAF50; color: white; border: none; cursor: pointer;">Save Profile</button>
  
  <hr>
  <h3>Active Profile</h3>
  <select id="profileList" style="padding: 6px; margin-bottom: 8px; width: 100%;"></select>
  <div class="btn-group">
    <button id="apply" style="background-color: #008CBA; color: white; border: none; cursor: pointer;">Apply</button>
    <button id="delete" style="background-color: #f44336; color: white; border: none; cursor: pointer;">Delete</button>
  </div>
  <button id="clear" style="margin-top: 5px; cursor: pointer;">Clear Proxy</button>

  <!-- بخش جدید فوتر -->
  <div class="footer">
    Created by Farshad Foroughi<br>
    <a href="https://github.com/persian85/Simple-Proxy-Switcher-SPS" target="_blank" rel="noopener noreferrer">View on GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
